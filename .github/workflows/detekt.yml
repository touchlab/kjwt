name: Detekt Checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  checks: write
  pull-requests: write
  contents: read
  security-events: write

jobs:
  detekt:
    name: Detekt Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # Push to main: generate SARIF and upload to GitHub Security tab
      - name: Run detekt (SARIF)
        if: github.event_name == 'push'
        run: ./gradlew mergedDetektReport

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name == 'push' && (success() || failure())
        with:
          sarif_file: build/reports/detekt/merged-report.sarif

      # Pull request: generate XML and report inline via reviewdog
      - name: Run detekt (XML)
        if: github.event_name == 'pull_request'
        run: ./gradlew mergedDetektXmlReport

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run reviewdog
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=checkstyle \
            -name="detekt" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-on-error \
            < build/reports/detekt/merged-report.xml