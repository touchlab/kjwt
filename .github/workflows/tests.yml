name: Tests

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jvm
            os: ubuntu-latest
            tasks: jvmTest

          - name: js/wasm
            os: ubuntu-latest
            tasks: jsTest wasmJsTest

          - name: linux
            os: ubuntu-latest
            tasks: linuxX64Test

          - name: apple
            os: macos-latest
            tasks: macosArm64Test iosSimulatorArm64Test watchosSimulatorArm64Test tvosSimulatorArm64Test

          - name: windows
            os: windows-latest
            tasks: mingwX64Test

          - name: android
            os: ubuntu-latest
            tasks: allSupportedGroupAndroidDeviceTest
            android: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Enable KVM
        if: matrix.android == true
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests
        if: matrix.android != true
        run: ./gradlew ${{ matrix.tasks }} --continue

      - name: Run tests (Android emulator)
        if: matrix.android == true
        run: ./gradlew ${{ matrix.tasks }} --continue

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: |
            **/build/test-results/**/TEST-*.xml
            **/build/outputs/androidTest-results/**/TEST-*.xml
          comment: ${{ github.event_name == 'pull_request' }}
