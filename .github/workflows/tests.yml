name: Tests

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jvm
            os: ubuntu-latest
            tasks: jvmTest

          - name: js/wasm
            os: ubuntu-latest
            tasks: jsTest wasmJsTest

          - name: linux
            os: ubuntu-latest
            tasks: linuxX64Test

          - name: apple
            os: macos-latest
            tasks: macosArm64Test iosSimulatorArm64Test watchosSimulatorArm64Test tvosSimulatorArm64Test

          - name: windows
            os: windows-latest
            tasks: mingwX64Test

          - name: android-23
            os: ubuntu-latest
            android: true
            api-level: 23
            target: default

          - name: android-28
            os: ubuntu-latest
            android: true
            api-level: 28
            target: default

          - name: android-35
            os: ubuntu-latest
            android: true
            api-level: 35
            target: aosp_atd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Enable KVM
        if: matrix.android == true
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests
        if: matrix.android != true
        run: ./gradlew ${{ matrix.tasks }} --continue

      - name: Run tests (Android emulator)
        if: matrix.android == true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          script: ./gradlew connectedAndroidDeviceTest --continue

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: |
            **/build/test-results/**/TEST-*.xml
            **/build/outputs/androidTest-results/**/TEST-*.xml
          comment: ${{ github.event_name == 'pull_request' }}

  ios-hardware-testing:
    name: Test (ios-hardware-testing)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Run iOS hardware tests
        run: |
          set -o pipefail && xcodebuild test \
            -project Subprojects/KJWT-HardwareTesting/iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            2>&1 | xcpretty --report junit --output build/test-results/ios/TEST-ios-hardware.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: build/test-results/ios/TEST-ios-hardware.xml
          comment: ${{ github.event_name == 'pull_request' }}
